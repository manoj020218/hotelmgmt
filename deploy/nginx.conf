# Hotel QR — Nginx configuration
# /etc/nginx/sites-available/hotelqr
# Cert: /etc/letsencrypt/live/hotelqr.iotsoft.in/ (covers all 4 domains)

upstream hotelqr_api {
    server 127.0.0.1:5001;
    keepalive 32;
}

# Allow up to 10 MB uploads (menu photos, UPI QR images)
client_max_body_size 10m;

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# ── Marketing page ────────────────────────────────────────────────────────────
server {
    listen 80;
    server_name hotelqr.iotsoft.in;
    location /.well-known/acme-challenge/ { root /var/www/acme; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl http2;
    server_name hotelqr.iotsoft.in;

    ssl_certificate     /etc/letsencrypt/live/hotelqr.iotsoft.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hotelqr.iotsoft.in/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/hotelqr-marketing;
    index index.html;

    location / { try_files $uri $uri/ /index.html; }

    location /apk/ {
        root /var/www/hotelqr-marketing;
        add_header Content-Disposition "attachment";
    }
}

# ── Admin PWA ─────────────────────────────────────────────────────────────────
server {
    listen 80;
    server_name hotelqr.admin.iotsoft.in;
    location /.well-known/acme-challenge/ { root /var/www/acme; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl http2;
    server_name hotelqr.admin.iotsoft.in;

    ssl_certificate     /etc/letsencrypt/live/hotelqr.iotsoft.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hotelqr.iotsoft.in/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/hotel-admin;
    index index.html;

    location / { try_files $uri $uri/ /index.html; }

    location /api/ {
        proxy_pass         http://hotelqr_api;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /socket.io/ {
        proxy_pass         http://hotelqr_api;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection $connection_upgrade;
        proxy_set_header   Host       $host;
        proxy_cache_bypass $http_upgrade;
    }

    location /uploads/ {
        proxy_pass http://hotelqr_api;
    }
}

