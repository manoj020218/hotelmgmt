# Hotel QR — Nginx configuration
# Place at: /etc/nginx/sites-available/hotelqr
# Enable: ln -s /etc/nginx/sites-available/hotelqr /etc/nginx/sites-enabled/hotelqr
# SSL:  certbot --nginx -d hotelqr.admin.iotsoft.in -d hotelqr.kds.iotsoft.in -d hotelqr.waiter.iotsoft.in

# ── Upstream ──────────────────────────────────────────────────────────────────
upstream hotelqr_api {
    server 127.0.0.1:5000;
    keepalive 32;
}

# ── Shared proxy settings (included in each server block) ────────────────────
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# ── Admin PWA ─────────────────────────────────────────────────────────────────
server {
    listen 80;
    server_name hotelqr.admin.iotsoft.in;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name hotelqr.admin.iotsoft.in;

    # SSL — filled in by Certbot
    ssl_certificate     /etc/letsencrypt/live/hotelqr.admin.iotsoft.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hotelqr.admin.iotsoft.in/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Admin SPA — served from /var/www/hotel-admin
    root /var/www/hotel-admin;
    index index.html;

    # SPA fallback — all non-file routes → index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API reverse proxy
    location /api/ {
        proxy_pass         http://hotelqr_api;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Socket.IO
    location /socket.io/ {
        proxy_pass         http://hotelqr_api;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection $connection_upgrade;
        proxy_set_header   Host       $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Uploaded files (receipts, QR images, menu photos)
    location /uploads/ {
        proxy_pass http://hotelqr_api;
    }
}

# ── KDS (web fallback + APK API target) ───────────────────────────────────────
server {
    listen 80;
    server_name hotelqr.kds.iotsoft.in;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name hotelqr.kds.iotsoft.in;

    ssl_certificate     /etc/letsencrypt/live/hotelqr.admin.iotsoft.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hotelqr.admin.iotsoft.in/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # KDS web build — served from /var/www/hotel-kds
    root /var/www/hotel-kds;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass         http://hotelqr_api;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /socket.io/ {
        proxy_pass         http://hotelqr_api;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection $connection_upgrade;
        proxy_set_header   Host       $host;
        proxy_cache_bypass $http_upgrade;
    }

    location /uploads/ {
        proxy_pass http://hotelqr_api;
    }
}

# ── Waiter (web fallback + APK API target) ────────────────────────────────────
server {
    listen 80;
    server_name hotelqr.waiter.iotsoft.in;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name hotelqr.waiter.iotsoft.in;

    ssl_certificate     /etc/letsencrypt/live/hotelqr.admin.iotsoft.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hotelqr.admin.iotsoft.in/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Waiter web build — served from /var/www/hotel-waiter
    root /var/www/hotel-waiter;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass         http://hotelqr_api;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location /socket.io/ {
        proxy_pass         http://hotelqr_api;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection $connection_upgrade;
        proxy_set_header   Host       $host;
        proxy_cache_bypass $http_upgrade;
    }

    location /uploads/ {
        proxy_pass http://hotelqr_api;
    }
}
